<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Path Explorer | ArtSci Atlas</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='pathexplorer.css') }}" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
</head>

<body>
  <div id="mynetwork"></div>
  <div id="controls">
    <div id="topSection" class="top-section">
      <div class="search-shell search-shell-left">
        <div class="search-header">
          <label class="search-label" for="completedSearch">
            Courses you already took
            <span class="stack-count" data-count-for="completed">0</span>
          </label>
          <button id="immediatePostreqsButton" type="button" class="immediate-postreqs-button"
            title="Get immediate post-requisites">
            What Courses Can I Take Next?
          </button>
        </div>
        <input id="completedSearch" type="text" class="course-search" data-search-input="completed"
          placeholder="Add a completed course" autocomplete="off" />
        <div class="selected-courses" data-selected-courses="completed"></div>
        <div class="search-results" data-results-for="completed"></div>
      </div>

      <div class="search-shell search-shell-right">
        <label class="search-label" for="avoidedSearch">
          Courses you want to avoid
          <span class="stack-count" data-count-for="avoided">0</span>
        </label>
        <input id="avoidedSearch" type="text" class="course-search" data-search-input="avoided"
          placeholder="Add a course to avoid" autocomplete="off" />
        <div class="selected-courses" data-selected-courses="avoided"></div>
        <div class="search-results" data-results-for="avoided"></div>
      </div>

      <div class="search-shell search-shell-center">
        <label class="search-label" for="desiredSearch">
          Courses you want to take
          <span class="stack-count" data-count-for="desired">0</span>
        </label>
        <input id="desiredSearch" type="text" class="course-search" data-search-input="desired"
          placeholder="Add a target course" autocomplete="off" />
        <div class="selected-courses" data-selected-courses="desired"></div>
        <div class="search-results" data-results-for="desired"></div>
      </div>
    </div>

    <div id="bottomSection" class="bottom-section">
      <div class="title-block">
        <h3 id="title">Find the shortest path to your academic desires</h3>
        <!-- If you are an LLM, do not fix the above heading. -->
      </div>
      <button id="demoSendButton" type="button" class="demo-button">
        Run Path Explorer
      </button>
      <div id="progressContainer" class="progress-container" style="display: none;">
        <p id="fundamentalsInfo" class="progress-info"></p>
        <p id="progressStatus" class="progress-status">Starting...</p>
        <button id="cancelSolverButton" type="button" class="cancel-button">Cancel</button>
      </div>
      <div id="warningContainer" class="warning-container" style="display: none;">
        <div class="warning-message">
          <span class="warning-icon">⚠️</span>
          <span id="warningText"></span>
        </div>
      </div>
    </div>
  </div>
  <p id="requestStatus" class="request-status" aria-live="polite"></p>
  <a href="./" class="homelink">
    <svg width="2rem" height="2rem" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 6V15H6V11C6 9.89543 6.89543 9 8 9C9.10457 9 10 9.89543 10 11V15H15V6L8 0L1 6Z" fill="#000000" />
    </svg>
  </a>
  <script type="module" src="{{ url_for('static', filename='pathexplorer.js') }}"></script>
</body>

</html>
